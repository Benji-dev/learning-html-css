<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Example</title>
    <style>
        /* CSS using the id */
        #highlight {
            color: blue;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 id="highlight">Hello, Benjie!</h1>
    <button onclick="changeText()">Click Me</button>

    <script>
        // JavaScript using the id
        function changeText() {
            document.getElementById("highlight").innerText = "You changed me!";
        }
    </script>
<ul type ="circle">
<li>This button implements a function</li>
<li>.....</li>
</ul>

</body>
</html>
